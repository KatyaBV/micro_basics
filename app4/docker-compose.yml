services:

  consul:
    image: hashicorp/consul:1.20
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8500:8500"

  consul-init:
    image: curlimages/curl:8.5.0
    depends_on:
      - consul
    command: >
      sh -c "
      sleep 5 &&
      curl -X PUT --data 'hazelcast-1:5701' http://consul:8500/v1/kv/config/hazelcast/members &&
      curl -X PUT --data 'transactions-map' http://consul:8500/v1/kv/config/hazelcast/map &&
      curl -X PUT --data 'counter-queue' http://consul:8500/v1/kv/config/queue/name
      "

  hazelcast-1:
    image: hazelcast/hazelcast:5.4
    environment:
      - HZ_CLUSTERNAME=bank-cluster
      - HZ_NETWORK_JOIN_MULTICAST_ENABLED=true
      - HZ_NETWORK_JOIN_TCPIP_ENABLED=false
    ports:
      - "5701:5701"

  hazelcast-2:
    image: hazelcast/hazelcast:5.4
    environment:
      - HZ_CLUSTERNAME=bank-cluster
      - HZ_NETWORK_JOIN_MULTICAST_ENABLED=true
      - HZ_NETWORK_JOIN_TCPIP_ENABLED=false
    ports:
      - "5702:5701"

  hazelcast-3:
    image: hazelcast/hazelcast:5.4
    environment:
      - HZ_CLUSTERNAME=bank-cluster
      - HZ_NETWORK_JOIN_MULTICAST_ENABLED=true
      - HZ_NETWORK_JOIN_TCPIP_ENABLED=false
    ports:
      - "5703:5701"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "fsync=off"
      - "-c"
      - "full_page_writes=off"
      - "-c"
      - "max_connections=200"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  logging-service-1:
    build: ./logging-service
    ports:
      - "8011:8000"
    environment:
      SERVICE_NAME: logging-service
      SERVICE_ID: logging-service-1
      SERVICE_HOST: logging-service-1
      SERVICE_PORT: 8000
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul
      - consul-init
      - hazelcast-1
      - hazelcast-2
      - hazelcast-3

  logging-service-2:
    build: ./logging-service
    ports:
      - "8012:8000"
    environment:
      SERVICE_NAME: logging-service
      SERVICE_ID: logging-service-2
      SERVICE_HOST: logging-service-2
      SERVICE_PORT: 8000
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul
      - consul-init
      - hazelcast-1
      - hazelcast-2
      - hazelcast-3

  logging-service-3:
    build: ./logging-service
    ports:
      - "8013:8000"
    environment:
      SERVICE_NAME: logging-service
      SERVICE_ID: logging-service-3
      SERVICE_HOST: logging-service-3
      SERVICE_PORT: 8000
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul
      - consul-init
      - hazelcast-1
      - hazelcast-2
      - hazelcast-3

  counter-service-1:
    build: ./counter-service
    ports:
      - "8002:8000"
    environment:
      SERVICE_NAME: counter-service
      SERVICE_ID: counter-service-1
      SERVICE_HOST: counter-service-1
      SERVICE_PORT: 8000
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bankdb
      DB_USER: bankuser
      DB_PASSWORD: bankpass
    depends_on:
      - consul
      - consul-init
      - postgres
      - hazelcast-1

  counter-service-2:
    build: ./counter-service
    ports:
      - "8003:8000"
    environment:
      SERVICE_NAME: counter-service
      SERVICE_ID: counter-service-2
      SERVICE_HOST: counter-service-2
      SERVICE_PORT: 8000
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bankdb
      DB_USER: bankuser
      DB_PASSWORD: bankpass
    depends_on:
      - consul
      - consul-init
      - postgres
      - hazelcast-1

  facade-service-1:
    build: ./facade-service
    ports:
      - "8000:8000"
    environment:
      SERVICE_NAME: facade-service
      SERVICE_ID: facade-service-1
      SERVICE_HOST: facade-service-1
      SERVICE_PORT: 8000
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul
      - consul-init
      - counter-service-1
      - counter-service-2
      - logging-service-1
      - logging-service-2
      - logging-service-3

  facade-service-2:
    build: ./facade-service
    ports:
      - "8005:8000"
    environment:
      SERVICE_NAME: facade-service
      SERVICE_ID: facade-service-2
      SERVICE_HOST: facade-service-2
      SERVICE_PORT: 8000
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul
      - consul-init
      - counter-service-1
      - counter-service-2
      - logging-service-1
      - logging-service-2
      - logging-service-3

volumes:
  postgres-data: